<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코딩 용어 퀴즈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-grid"></div>

  <!-- 홈 화면 -->
  <div id="screen-home" class="screen active">
    <header class="app-header">
      <div class="brand">
        <span class="brand-bracket">&lt;</span>
        <span class="brand-name">코딩 용어 퀴즈</span>
        <span class="brand-bracket">&nbsp;/&gt;</span>
        <span class="brand-cursor">_</span>
      </div>
    </header>
    <main class="home-container">
      <p class="section-label"><span class="label-comment">// </span>주차 선택</p>
      <div id="week-list"></div>

      <div id="review-section" style="display:none">
        <p class="section-label" style="margin-top:2rem"><span class="label-comment">// </span>복습 모드</p>
        <div id="wrong-review-card" class="review-card review-card-wrong">
          <div class="review-card-header">
            <span class="review-label">✗ 틀린 것 복습</span>
            <span id="wrong-count" class="review-count"></span>
          </div>
          <p class="review-hint">오답 · 모르겠음 — 카테고리별 선택</p>
        </div>
        <div id="correct-review-card" class="review-card review-card-correct">
          <div class="review-card-header">
            <span class="review-label">✓ 맞은 것 복습</span>
            <span id="correct-count" class="review-count"></span>
          </div>
          <p class="review-hint">한 번이라도 정답을 맞춘 용어 전체</p>
        </div>
      </div>
    </main>
  </div>

  <!-- 틀린 것 카테고리 화면 -->
  <div id="screen-wrong-cats" class="screen">
    <header class="app-header nav-header">
      <button id="btn-wc-back" class="back-btn">← 홈</button>
      <h2>틀린 것 복습</h2>
      <span></span>
    </header>
    <main class="week-container">
      <p class="section-label"><span class="label-comment">// </span>카테고리 선택</p>
      <div id="wrong-cat-list"></div>
    </main>
  </div>

  <!-- 주차 상세 화면 -->
  <div id="screen-week" class="screen">
    <header class="app-header nav-header">
      <button id="btn-back-home" class="back-btn">← 홈</button>
      <h2 id="week-title"></h2>
      <span></span>
    </header>
    <main class="week-container">
      <div id="day-list"></div>
    </main>
  </div>

  <!-- 퀴즈 화면 -->
  <div id="screen-quiz" class="screen">
    <header class="app-header nav-header">
      <button id="btn-back-week" class="back-btn">← 뒤로</button>
      <h2 id="quiz-session-title"></h2>
      <span id="quiz-progress" class="quiz-progress-badge"></span>
    </header>
    <div id="review-controls" class="review-controls" style="display:none">
      <select id="category-select" class="category-select"></select>
    </div>
    <main class="quiz-container">
      <div class="question-meta">
        <span class="category-badge" id="category-badge"></span>
        <span class="difficulty-badge" id="difficulty-badge"></span>
      </div>
      <div class="question-box">
        <p class="question-label">다음 설명에 해당하는 용어를 고르세요.</p>
        <p class="question-stem" id="question-stem"></p>
      </div>
      <div class="choices" id="choices"></div>
      <div class="result-box" id="result-box"></div>
      <button id="next-btn">다음 문제 →</button>
    </main>
  </div>

  <!-- 완료 화면 -->
  <div id="screen-complete" class="screen">
    <main class="complete-container">
      <div class="complete-card">
        <div class="complete-icon">◈</div>
        <h2 id="complete-title"></h2>
        <p id="complete-score" class="complete-score"></p>
        <p id="complete-miss" class="complete-miss"></p>
        <div class="complete-buttons">
          <button id="btn-complete-next" class="btn-primary">다음 날로 →</button>
          <button id="btn-complete-home" class="btn-secondary">홈으로</button>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
